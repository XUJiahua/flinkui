name: Release

# Build binaries + multi-arch Docker image and attach binaries to the Release.
# Triggers on creating a GitHub Release, or on pushing a version tag (vX.Y.Z).
on:
  release:
    types: [created]
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write # upload release assets
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

env:
  # Docker Hub image (credentials via DOCKER_USERNAME / DOCKER_PASSWORD secrets).
  IMAGE: docker.io/johnxu1989/flinkui

jobs:
  # ---------------------------------------------------------------------------
  # Cross-compile the single binary (frontend embedded) for linux/darwin amd64/arm64
  # and attach the archives to the Release.
  # ---------------------------------------------------------------------------
  binaries:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Build frontend (static export)
        working-directory: frontend
        run: |
          pnpm install --frozen-lockfile
          pnpm build

      - name: Embed frontend into web/dist
        run: |
          rm -rf web/dist && mkdir -p web/dist
          cp -r frontend/out/* web/dist/

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binaries
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          mkdir -p dist
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64; do
            os="${target%/*}"; arch="${target#*/}"
            name="flinkui-${VERSION}-${os}-${arch}"
            echo "==> building ${name}"
            mkdir -p "dist/${name}"
            CGO_ENABLED=0 GOOS="${os}" GOARCH="${arch}" \
              go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" \
              -o "dist/${name}/flinkui" ./cmd/server
            cp README.md .env.example "dist/${name}/" 2>/dev/null || true
            tar -C dist -czf "dist/${name}.tar.gz" "${name}"
            rm -rf "dist/${name}"
          done
          (cd dist && sha256sum *.tar.gz > checksums.txt)
          ls -la dist

      - name: Attach binaries to Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/*.tar.gz
            dist/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # Build and push the multi-arch Docker image to Docker Hub.
  # The Dockerfile builds the frontend + Go binary internally (single image).
  # ---------------------------------------------------------------------------
  docker:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          registry: docker.io
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker metadata (tags/labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push (linux/amd64 + linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ github.ref_name }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
