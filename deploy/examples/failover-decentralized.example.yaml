# Example config enabling DECENTRALIZED HA (failover-decentralized).
# Each side's flinkui runs a mirror-image config and acts ONLY on its local
# cluster; coordination is via the shared S3 fencing token + handoff record.
# Run with:  ./bin/flinkui -config failover-decentralized.example.yaml
#
# See docs/failover-decentralized-design.md.

addr: ":8080"

auth:
  username: admin
  password: "change-me"
  session_secret: "change-me-too"   # openssl rand -hex 16

# The LOCAL cluster this instance manages (in-cluster SA => empty kubeconfig).
# Its s3 block is the SHARED object store both sides use for fencing/handoff.
cluster:
  name: cluster-a
  namespace: flink-jobs
  kubeconfig: ""
  s3:
    endpoint: "https://minio.flink-operator:9000"   # S3 API port (shared store)
    bucket: flink
    # Optional base path to isolate this instance in a shared bucket. Either set
    # bucket to "flink/tenant-a", or keep bucket and add: prefix: tenant-a
    # prefix: ""
    access_key: minioadmin
    secret_key: minioadmin
    path_style: true
    insecure: true

# Decentralized HA groups. Identities are instance-level; a group is usually
# just its name (namespace <- cluster.namespace, deployment <- prefix+name,
# cluster_id/peer_cluster_id <- the defaults below).
ha:
  self_cluster_id: cluster-a          # my clusterId (token value when active)
  default_peer_cluster_id: cluster-b  # the peer (display + handoff)
  # auto_all: true                    # manage EVERY deployment in the namespace
  groups:
    - name: orders                     # => deployment flink-sql-job-orders, ns flink-jobs
    # per-group overrides (optional):
    # - name: special
    #   namespace: other-ns
    #   deployment: custom-name
    #   peer_cluster_id: cluster-c

# On the PEER cluster's flinkui, the mirror config would be:
#   cluster: { name: cluster-b, ... same shared s3 ... }
#   ha: { self_cluster_id: cluster-b, default_peer_cluster_id: cluster-a, groups: [ { name: orders } ] }
