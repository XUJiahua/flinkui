# flinkui 配置示例：内置 OpenBao/Vault -> K8s Secret 同步（无 ESO）
# 用法：flinkui --config this.yaml  （或将同名 key 通过 FKO_* 环境变量注入）
#
# 前提：
#   - flinkui 的 ServiceAccount 已绑定到 OpenBao 的 vault-app-role（K8s auth）
#   - Helm 安装时 --set secretSync.enabled=true（给 SA 加 secrets 写权限）
#   - OpenBao KV v2 里已有对应路径的密钥

cluster:
  name: default
  namespace: flink-vault-a          # 目标命名空间（Secret 与 FlinkDeployment 所在）

secret_sync:
  enabled: true
  interval_sec: 300                 # 周期同步间隔（秒）
  auto_restart: true                # 值变化时自动 bump FlinkDeployment.restartNonce
  openbao:
    addr: http://vault.vault.svc.cluster.local:8200
    kv_mount: kv                    # KV v2 挂载名
    auth_mount: kubernetes          # K8s auth 挂载
    role: vault-app-role            # 绑定 flinkui SA 的 Vault role
    # namespace: ""                 # Vault 企业版 namespace；OpenBao OSS 留空
    # cacert: /etc/openbao/ca.crt   # https 自签时提供 CA
    # token: ""                     # 静态 token（本地调试）；留空=走 K8s auth
  items:
    - secret_name: flink-s3-credentials
      kv_path: config/cil/flink/vault-a/s3
      restart_deployment: flink-sql-job-demo-kafka-redis
    - secret_name: flink-job-env
      kv_path: config/cil/flink/vault-a/job-env
      restart_deployment: flink-sql-job-demo-kafka-redis
