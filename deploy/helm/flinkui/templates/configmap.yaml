{{- if or .Values.ha.groups .Values.ha.autoAll }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "flinkui.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "flinkui.labels" . | nindent 4 }}
data:
  config.yaml: |
    # Rendered by the Helm chart. Only ha.* is provided here; addr/auth/cluster/s3
    # come from FKO_* env vars, which override config-file values.
    ha:
      {{- with .Values.ha.selfClusterId }}
      self_cluster_id: {{ . | quote }}
      {{- end }}
      {{- with .Values.ha.defaultPeerClusterId }}
      default_peer_cluster_id: {{ . | quote }}
      {{- end }}
      auto_all: {{ .Values.ha.autoAll | default false }}
      groups:
        {{- range .Values.ha.groups }}
        - name: {{ .name | quote }}
          {{- with .namespace }}
          namespace: {{ . | quote }}
          {{- end }}
          {{- with .deployment }}
          deployment: {{ . | quote }}
          {{- end }}
          {{- with .clusterId }}
          cluster_id: {{ . | quote }}
          {{- end }}
          {{- with .peerClusterId }}
          peer_cluster_id: {{ . | quote }}
          {{- end }}
          {{- with .fencingKey }}
          fencing_key: {{ . | quote }}
          {{- end }}
          {{- with .neutralToken }}
          neutral_token: {{ . | quote }}
          {{- end }}
          {{- with .handoffKey }}
          handoff_key: {{ . | quote }}
          {{- end }}
        {{- end }}
{{- end }}
