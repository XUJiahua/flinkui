{{- if not .Values.auth.existingSecret -}}
{{- if not .Values.auth.password -}}
{{- fail "auth.password is required (or set auth.existingSecret). The console must not run unauthenticated." -}}
{{- end -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "flinkui.authSecretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "flinkui.labels" . | nindent 4 }}
type: Opaque
stringData:
  username: {{ .Values.auth.username | quote }}
  password: {{ .Values.auth.password | quote }}
  session-secret: {{ required "auth.sessionSecret is required (or set auth.existingSecret)" .Values.auth.sessionSecret | quote }}
{{- end }}
