# Example values for the sample k3s cluster (namespace flink-jobs + MinIO).
# Install:
#   helm upgrade --install flinkui deploy/helm/flinkui \
#     -n flink-jobs --create-namespace \
#     -f deploy/helm/flinkui/values-example.yaml \
#     --set auth.password="change-me" \
#     --set auth.sessionSecret="$(openssl rand -hex 16)" \
#     --set s3.accessKey=minioadmin --set s3.secretKey=minioadmin

image:
  repository: docker.io/johnxu1989/flinkui
  tag: "0.2.4"

config:
  clusterName: "k3s"
  # FlinkDeployments live in flink-jobs; RBAC is created there.
  targetNamespace: "flink-jobs"

auth:
  username: "admin"
  # password / sessionSecret provided via --set or an existingSecret.

s3:
  enabled: true
  # In-cluster S3 API service (NOT the console port). Reached directly in-cluster.
  endpoint: "https://minio.flink-operator:9000"
  region: "us-east-1"
  pathStyle: true
  insecure: true # self-signed MinIO cert
  # accessKey / secretKey via --set or an existingSecret.

service:
  type: ClusterIP
  port: 80

# Optional: decentralized HA (see values-example-full.yaml / docs). Requires the
# peer cluster's flinkui to run a mirror config against the same shared S3.
# ha:
#   selfClusterId: cluster-a
#   defaultPeerClusterId: cluster-b
#   autoAll: false          # or true to manage all jobs in the namespace
#   groups:
#     - name: i-20251209-halykbank-codes
